name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install flet pandas openpyxl numpy
      
      # 接受 Android 许可证（关键修复）
      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses
      
      - name: Build APK
        run: |
          yes | flet build apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: MoneyLens-APK
          path: build/apk/output/*.apk
